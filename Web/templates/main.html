  <div class="dropdown">
    <input type="text" class="textBox" placeholder="Dropdown Menu" readonly name="option">
    <div class="option" >
        <div aria-valuetext="brain tumor" onclick="show('Brain Tumors')"><i class='bx bxs-brain' id="brain-login"></i>     Brain Tumors</div>
        <div aria-valuetext="lung cancer" onclick="show('Lung Cancer')"><i class='bx bxs-capsule' id="brain-login"></i>     Lung Cancer</div>
        <div aria-valuetext="kidney stone" onclick="show('Kidney Stone')"><i class='bx bxs-capsule' id="brain-login"></i>     Kidney Stone</div>
        <div aria-valuetext="recognize" onclick="show('To Recognize')"><i class='bx bxs-injection' id="brain-login"></i>     To Recognize</div>
        <div aria-valuetext="recognize and predict" onclick="show('To Recognize And Predict')"><i class='bx bxs-capsule' id="brain-login"></i>     To Recognize And Predict</div>
    </div>
</div>
<button type="submit" class="btn">Submit</button>
<div class="result-box">
</div>
<script>
  document.getElementById('container').addEventListener('submit', async function(event){
    event.preventDefault();
    
    const formData = new FormData();
    const imageFile = document.getElementById('imageInput').files[0];
    const optionValue = document.getElementById('brain-login').ariaValueText;
    
    formData.append('image', imageFile);
    formData.append('option', optionValue);

    try {
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });
        if (response.ok) {
            console.log('Image uploaded successfully');
        } else {
            console.error('Failed to upload image');
        }
    } catch (error) {
        console.error('Error uploading image:', error);
    }
});

</script>

<script>
    function show(anything){
        document.querySelector('.textBox').value = anything;
    }

    let dropdown = document.querySelector('.dropdown');
    dropdown.onclick = function(){
        dropdown.classList.toggle('active');
    }
</script>

    <script>
      const toggleBtn = document.querySelector('.toggle_btn')
      const toggleBtnIcon = document.querySelector('.toggle_btn i')
      const dropDownMenu = document.querySelector('.dropdown_menu')
      
      // toggleBtn.onclick = function(){
      //   dropDownMenu.classList.toggle('open')
      //   const isOpen = dropDownMenu.classList.contains('open')

      //   toggleBtnIcon.classList = isOpen
      //   ? 'fa-solid fa-xmark'
      //   : 'fa-solid fa-bars'
      // }


      const wrapper = document.querySelector(".wrapper");
      const fileName = document.querySelector(".file-name");
      const cancelBtn = document.querySelector("#cancel-btn");
      const fileInput = document.getElementById("default-btn");
      const customBtn = document.getElementById("custom-btn");
      const img = document.querySelector("img");
      let regExp = /[0-9a-zA-Z\^\&\'\@\{\}\[\]\,\$\=\!\-\#(\)\.\%\+\~\_ ]+$/;
      // function defaultBtnActive(){
      //   //defaultBtnActive.click;
      // }
      customBtn.addEventListener("click",()=>{
        fileInput.click();
      })
      fileInput.addEventListener("change", function(){
        const file = this.files[0];
        if(file){
          const reader = new FileReader();
          reader.onload = function(){
          const result = reader.result;
          img.src = result;
          wrapper.classList.add("active");
        }
        cancelBtn.addEventListener("click", function(){
          img.src = "";
          fileName.textContent='';
        });
        reader.readAsDataURL(file);
        }
        if(this.value){
          let valueStore = this.value.match(regExp);
          fileName.textContent = valueStore;
        }
      });


     





    </script>
