<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="start_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Responsive Navbar</title>
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo"><a href="index.html">Mr.Docotr</a></div>
        <ul class="links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="project.html">projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="start.html" class="action_btn">Get Started</a>
        <div class="toggle_btn">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </header>
    

    <div class="login-box">
      <h2>Login</h2>
      <form action="main.html">
        <div class="input-box">
          <input type="text" class="user" required>
          <label>Username</label>
        </div>
        <div class="input-box">
          <input type="password" class="pass" required>
          <label>password</label>
        </div>
        <div class="forget-pass">
          <a href="#">Forget your passowrd?</a>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="singup-link">
          <a href="#">singup</a>
        </div>
      </form>
    </div>

    


    <script>
      const toggleBtn = document.querySelector('.toggle_btn')
      const toggleBtnIcon = document.querySelector('.toggle_btn i')
      const dropDownMenu = document.querySelector('.dropdown_menu')
      
      toggleBtn.onclick = function(){
        dropDownMenu.classList.toggle('open')
        const isOpen = dropDownMenu.classList.contains('open')

        toggleBtnIcon.classList = isOpen
        ? 'fa-solid fa-xmark'
        : 'fa-solid fa-bars'
      }


      var username = document.getElementbyId("user").value;
      var password = document.getElementById("pass").value;
      let isOk = (username == "admin") && (password=="123456");
      Boolean(isOk);
      if (isOk){
        console.log("login success");
      }
      else{
        console.log("login failed!")
      }
    </script>
  </body>
</html>
