<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/start_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="images/icon-2-big.png" sizes="25x25" type="image/png">  

    <title>Mr,Doctor</title>
  </head>
  <body>
    <header class="header">
      <a href="#" class="logo">Mr.Doctor</a>

      <i class='bx bx-menu' id="menu-icon"></i>

      <nav class="navbar">
        <a href="#home" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
        <a href="start.html">Get Start</a>
        <a href="indexPersian.html">فارسی</a>
      </nav>
    </header>
    

    <div class="login-box">
      <h2>Login</h2>
      <form action="main.html">
        <div class="input-box">
          <input type="text" class="user" required>
          <label>Username</label>
        </div>
        <div class="input-box">
          <input type="password" class="pass" required>
          <label>password</label>
        </div>
        <div class="forget-pass">
          <a href="#">Forget your passowrd?</a>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="singup-link">
          <a href="#">singup</a>
        </div>
      </form>
    </div>

    


    <script>
      const toggleBtn = document.querySelector('.toggle_btn')
      const toggleBtnIcon = document.querySelector('.toggle_btn i')
      const dropDownMenu = document.querySelector('.dropdown_menu')
      
      toggleBtn.onclick = function(){
        dropDownMenu.classList.toggle('open')
        const isOpen = dropDownMenu.classList.contains('open')

        toggleBtnIcon.classList = isOpen
        ? 'fa-solid fa-xmark'
        : 'fa-solid fa-bars'
      }


      var username = document.getElementbyId("user").value;
      var password = document.getElementById("pass").value;
      let isOk = (username == "admin") && (password=="123456");
      Boolean(isOk);
      if (isOk){
        console.log("login success");
      }
      else{
        console.log("login failed!")
      }
    </script>
  </body>
</html>
